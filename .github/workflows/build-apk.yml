name: Build Wavelength IV APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Name tablet installer
        run: cp app/build/outputs/apk/debug/app-debug.apk Wavelength-IV-Tablet.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Wavelength-IV-Tablet-APK
          path: Wavelength-IV-Tablet.apk
          if-no-files-found: error
          retention-days: 30
