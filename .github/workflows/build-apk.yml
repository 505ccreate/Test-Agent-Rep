name: Build Wavelength IV APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble installable APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Restore app interface
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, gzip, re

          source = Path('app/src/main/assets/index.html.gz.b64')
          target = Path('app/src/main/assets/index.html')
          cleaned = re.sub(rb'[^A-Za-z0-9+/=]', b'', source.read_bytes())
          cleaned += b'=' * (-len(cleaned) % 4)
          html = gzip.decompress(base64.b64decode(cleaned, validate=False))
          if b'Wavelength IV' not in html or b'AudioContext' not in html:
              raise SystemExit('Recovered interface failed validation')
          target.write_bytes(html)
          print(f'Restored {target} ({len(html)} bytes)')
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Name tablet installer
        run: cp app/build/outputs/apk/debug/app-debug.apk Wavelength-IV-Tablet.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Wavelength-IV-Tablet-APK
          path: Wavelength-IV-Tablet.apk
          if-no-files-found: error
          retention-days: 30
